services:
  - type: web
    name: muslim-com-web
    env: node
    plan: free
    buildCommand: npm ci && npm run db:generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: muslim-com-db
          property: connectionString
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_TOKEN
        sync: false

databases:
  - name: muslim-com-db
    databaseName: muslim_com
    user: muslim_com_user
